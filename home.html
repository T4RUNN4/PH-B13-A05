<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home | Github Issue Tracker</title>

    <!-- Daisy UI + tailwind -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        font-family: "Geist", sans-serif;
        font-style: normal;
      }
    </style>

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
  </head>
  <body class="bg-[#F8FAFC]">
    <header>
      <div
        class="navbar flex justify-between bg-base-100 shadow-sm px-10 py-4 bg-white"
      >
        <div class="flex">
          <img
            src="./assets/github-logo.png"
            alt="github logo"
            class="w-9 h-9"
          />
          <a class="btn btn-ghost text-xl">Github Issue Tracker</a>
        </div>
        <div class="flex gap-2">
          <input
            type="text"
            placeholder="Search  issues..."
            class="input input-bordered w-24 md:w-auto"
          />
          <button class="btn btn-primary">+ New Issue</button>
        </div>
      </div>
    </header>
    <main class="flex flex-col max-w-6xl mx-auto">
      <div class="flex gap-3 mt-16 mb-6 p-6 bg-white rounded-md shadow-md">
        <button onclick="loadIssues('all')" id="allTab" class="btn btn-primary w-28">All</button>
        <button onclick="loadIssues('open')" id="openTab" class="btn w-28">Open</button>
        <button onclick="loadIssues('closed')" id="closedTab" class="btn w-28">Closed</button>
      </div>
      <div
        class="flex items-center justify-between p-6 bg-white rounded-md shadow-lg"
      >
        <div class="flex gap-3">
          <div
            class="rounded-full w-11 h-11 bg-[#4A00FF]/10 flex items-center justify-center"
          >
            <img
              src="./assets/Aperture.png"
              alt="Aperture Image"
              class="w-8 h-8"
            />
          </div>
          <div class="flex flex-col">
            <h2 class="font-semibold text-xl text-[#1F2937]">
              <span id="issue-count">52</span> Issues
            </h2>
            <p class="text-[#64748B] text-base">
              Track and Manage your project issues
            </p>
          </div>
        </div>
        <div class="flex flex-row items-center justify-center gap-4">
          <div class="w-3 h-3 rounded-full bg-green-600"></div>
          <p class="font-medium">Open</p>
          <div class="w-3 h-3 rounded-full bg-violet-800"></div>
          <p class="font-medium">Closed</p>
        </div>
      </div>
      <div
        id="issue-container"
        class="grid lg:grid-cols-4 gap-4 p-6 bg-[#FBFBFB] shadow-md"
      >
      </div>
    </main>
    <script src="./scripts/home.js"></script>
  </body>
</html>
