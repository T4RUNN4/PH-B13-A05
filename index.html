<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Github Issue Tracker</title>

    <!-- Daisy UI + tailwind -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        font-family: "Geist", sans-serif;
        font-style: normal;
      }
    </style>

    <!-- Font Awesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
  </head>
  <body class="bg-[#F8FAFC] m-auto py-14">
    <div
      class="flex flex-col gap-6 bg-white max-w-xl m-auto p-8 rounded-md shadow-md text-center"
    >
      <div class="flex justify-center">
        <img
          src="./assets/github-logo.png"
          alt="Github Logo"
          class="w-24 h-24"
        />
      </div>
      <div class="flex flex-col">
        <h1 class="font-semibold text-[#1F2937] text-2xl">
          Github Issue Tracker
        </h1>
        <h2 class="font-normal text-[#64748B] text-lg">
          Sign-in to manage your issues
        </h2>
      </div>
      <div class="flex flex-col text-left">
        <fieldset class="fieldset">
          <legend class="fieldset-legend">Username</legend>
          <input
            type="text"
            class="input w-full"
            placeholder="Enter Username"
            id="username"
          />
          <p class="label text-[#4A00FF]">Default: admin</p>
        </fieldset>
        <fieldset class="fieldset">
          <legend class="fieldset-legend">Password</legend>
          <input
            type="password"
            class="input w-full"
            placeholder="Enter Password"
            id="password"
          />
          <p class="label text-[#4A00FF]">Default: admin123</p>
        </fieldset>
      </div>
      <button onclick="handleLogin()" class="btn btn-primary w-full">Sign In</button>
      <div class="divider">OR</div>
      <div class="flex flex-col gap-1.5">
          <p class="text-[#64748B] text-sm">Demo Credentials:</p>
          <div class="bg-[#F8FAFC] p-6 text-[#1F2937] rounded-md">
            <p><span class="font-bold">Username: </span>admin</p>
            <p><span class="font-bold">Password: </span>admin123</p>
          </div>
      </div>
    </div>
    <script src="./scripts/login.js"></script>
  </body>
</html>
